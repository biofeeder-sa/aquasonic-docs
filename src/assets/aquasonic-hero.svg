<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Fondo con gradiente de agua -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#bgGrad)"/>

  <!-- Ondas de sonido / agua -->
  <path d="M 50 150 Q 100 120 150 150 Q 200 180 250 150 Q 300 120 350 150"
        stroke="url(#waveGrad)" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M 50 170 Q 100 140 150 170 Q 200 200 250 170 Q 300 140 350 170"
        stroke="url(#waveGrad)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 50 130 Q 100 100 150 130 Q 200 160 250 130 Q 300 100 350 130"
        stroke="url(#waveGrad)" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- C�rculos decorativos de pulso -->
  <circle cx="200" cy="150" r="40" stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="200" cy="150" r="60" stroke="#0ea5e9" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="200" cy="150" r="80" stroke="#0ea5e9" stroke-width="0.5" fill="none" opacity="0.1"/>

  <!-- Punto central -->
  <circle cx="200" cy="150" r="8" fill="#0ea5e9" opacity="0.9"/>
  <circle cx="200" cy="150" r="4" fill="white"/>

  <!-- Texto decorativo sutil -->
  <text x="200" y="240" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#0ea5e9" opacity="0.5" letter-spacing="4">AQUASONIC</text>
</svg>
